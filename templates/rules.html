{% extends "base.html" %}
{% block content %}
<div class="container mt-5">
  <h2>Risk Scoring Rules</h2>
  <table class="table table-dark">
    <thead>
      <tr>
        <th>ID</th><th>Name</th><th>Severity</th><th>Score</th>
      </tr>
    </thead>
    <tbody>
      {% for r in rules %}
      <tr>
        <td>{{ r.id }}</td>
        <td>{{ r.name }}</td>
        <td>{{ r.severity }}</td>
        <td>{{ r.score }}</td>
      </tr>
      {% endfor %}
    </tbody>
  </table>
</div>
{% endblock %}
