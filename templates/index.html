{% extends "base.html" %}
{% block content %}

<div class="container mt-5">
    <h2>Start Security Scan</h2>

    {% if error %}
        <div class="alert alert-danger">{{ error }}</div>
    {% endif %}

    <form method="POST">
        <div class="mb-3">
            <input type="text" name="target" class="form-control" placeholder="Enter domain or IP" required>
        </div>
        <button type="submit" class="btn btn-primary">Scan Now</button>
    </form>
</div>

{% endblock %}
